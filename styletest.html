<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Style Test</title>
<style>
body,html{margin:0;height:100%;font-family:Arial;}
#map{width:100%;height:calc(100vh - 80px);}
#controls{height:80px;display:flex;align-items:center;gap:12px;padding:0 16px;background:#2a1d12;}
label{color:#E2C9A8;font-size:12px;}
input[type=color]{width:40px;height:30px;cursor:pointer;}
button{background:#E2C9A8;border:none;padding:8px 16px;cursor:pointer;font-weight:bold;}
#status{color:#C9A96E;font-size:11px;}
</style>
</head>
<body>
<div id="controls">
  <label>Water: <input type="color" id="c-water" value="#3a2d1c" oninput="applyStyle()"></label>
  <label>Land: <input type="color" id="c-land" value="#f2f2f2" oninput="applyStyle()"></label>
  <label>Highway: <input type="color" id="c-hwy" value="#e0d0b0" oninput="applyStyle()"></label>
  <label>Arterial: <input type="color" id="c-art" value="#d4d4d4" oninput="applyStyle()"></label>
  <button onclick="applyStyle()">Apply</button>
  <span id="status">Loading…</span>
</div>
<div id="map"></div>

<script>
let map;

function applyStyle(){
  if(!map) return;
  const water = document.getElementById('c-water').value;
  const land  = document.getElementById('c-land').value;
  const hwy   = document.getElementById('c-hwy').value;
  const art   = document.getElementById('c-art').value;

  const style = [
    {elementType:'labels.text.stroke', stylers:[{visibility:'off'}]},
    {featureType:'landscape', elementType:'all', stylers:[{color:land}]},
    {featureType:'water', elementType:'geometry.fill', stylers:[{color:water}]},
    {featureType:'road.highway', elementType:'geometry.fill', stylers:[{color:hwy}]},
    {featureType:'road.arterial', elementType:'geometry.fill', stylers:[{color:art}]},
    {featureType:'road.local', elementType:'all', stylers:[{visibility:'off'}]},
    {featureType:'poi', elementType:'all', stylers:[{visibility:'off'}]},
    {featureType:'transit', elementType:'all', stylers:[{visibility:'off'}]},
    {featureType:'administrative', elementType:'labels', stylers:[{visibility:'off'}]},
  ];

  map.setOptions({styles: style});
  document.getElementById('status').textContent = 'Style applied — water:'+water+' land:'+land;
}

window.initMap = function(){
  map = new google.maps.Map(document.getElementById('map'), {
    center: {lat:19.2330, lng:72.8580},
    zoom: 14,
    mapTypeControl: false,
    streetViewControl: false
  });
  google.maps.event.addListenerOnce(map,'idle',()=>{
    document.getElementById('status').textContent = 'Map ready — change a color';
    applyStyle();
  });
};

window.gm_authFailure = function(){
  document.getElementById('status').textContent = 'API KEY ERROR';
};
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBLzi_xut6Y6lgShdOkPCePTXreCqUBJVo&callback=initMap"></script>
</body>
</html>
